<!doctype html>
<html class="mlb">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta id="app-version" name="app-version" content="" />
  <title>Sports Slate</title>

  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png">

  <link rel="stylesheet" href="/static/css/ui.css">
  <link rel="stylesheet" href="/static/css/pga_dev.css">
</head>

<body>
  <div class="container">

    <header class="page-header">
      <h1 class="page-title">Today’s Sports Slate</h1>
    </header>

    <!-- Sport tabs -->
    <div class="tabs" role="tablist" aria-label="Sport tabs">
      <button id="tabMlb" class="tab active" type="button" role="tab" aria-selected="true">MLB</button>
      <button id="tabNfl" class="tab" type="button" role="tab" aria-selected="false">NFL</button>
      <button id="tabCfb" class="tab" type="button" role="tab" aria-selected="false">CFB</button>
      <button id="tabCbb" class="tab" type="button" role="tab" aria-selected="false">CBB</button>
      <button id="tabPga" class="tab" type="button" role="tab" aria-selected="false">PGA</button>
    </div>

    <!-- Integrated status + controls (low key, single row) -->
    <div class="row" style="align-items:center;">
      <div id="controlsInline" class="muted" aria-live="polite" style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">

        <!-- Updated counter removed; polling/refresh logic unchanged -->

        <!-- CBB-only controls (wrapped so MLB mode can hide labels AND selects) -->
        <span id="thrillGroup" style="display:inline-flex; gap:10px; align-items:center;">
          <span class="muted" style="font-size:12px;">Thrill</span>
          <select id="minThrill" style="height:32px; padding:6px 10px; border-radius:10px;">
            <option value="0">Any</option>
            <option value="40">40+</option>
            <option value="60">60+</option>
            <option value="70">70+</option>
          </select>
        </span>

        <span id="confGroup" style="display:inline-flex; gap:10px; align-items:center;">
          <span class="muted" style="font-size:12px;">Filter</span>
          <select id="confFilter" style="height:32px; padding:6px 10px; border-radius:10px;">
            <option value="">All games</option>
          </select>
        </span>

        <button id="clearFilters" class="secondary" type="button"
                style="height:32px; padding:6px 10px; border-radius:10px;">
          Clear
        </button>

        <!-- Date controls (inline with Clear) -->
        <button id="prevDayBtn" class="secondary" type="button"
                style="height:32px; padding:6px 10px; border-radius:10px;">
          ◀
        </button>

        <input id="datePicker" type="date"
               style="height:32px; padding:6px 10px; border-radius:10px;" />

        <button id="nextDayBtn" class="secondary" type="button"
                style="height:32px; padding:6px 10px; border-radius:10px;">
          ▶
        </button>

        <button id="todayBtn" class="secondary today-btn" type="button"
                style="height:32px; padding:6px 10px; border-radius:10px;">
          Today
        </button>

      </div>
    </div>

    <!-- Status / errors -->
    <div id="countLine" class="muted" style="margin-top:10px;"></div>
    <div id="error" class="error"></div>

    <!-- PGA Leaderboard Section (hidden by default) -->
    <div id="pgaSection" style="display:none;">
      <div class="row pga-meta" aria-live="polite">
        <div id="eventName" class="pga-event-name">Waiting for data...</div>
        <div class="pga-detail-row">
          <div id="eventDetail" class="muted">Field: --</div>
          <select id="roundSelect" class="round-select" aria-label="Round selector"></select>
        </div>
      </div>
      <div class="table-wrap">
        <table>
            <colgroup>
              <col class="col-pos" />
              <col class="col-player" />
              <col class="col-to-par" />
              <col class="col-thru" />
              <col class="col-today" />
            </colgroup>
            <thead>
              <tr>
                <th>Pos</th>
                <th>Player</th>
                <th>To Par</th>
                <th>Thru</th>
                <th>Today</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>
      </div>
    </div>

    <!-- CARD BOARD (JS will render here for MLB/NFL/CFB/CBB) -->
    <div id="cardBoard" class="board"></div>

    <!-- TABLE (kept for rollback, currently hidden) -->
    <div class="table-wrap" style="display:none;">
      <table id="tbl" style="display:none;">
        <thead>
          <tr>
            <th data-sort="time">Start (Local)</th>
            <th>Matchup</th>
            <th>Network</th>
            <th class="kp" data-sort="kp">KenPom</th>
            <th data-sort="thrill">Thrill</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

  </div>

  <script src="/static/js/pga_dev.js?v=29"></script>
  <script src="/static/js/ui.js?v=29"></script>
</body>
</html>
